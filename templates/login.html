{% extends "base.html" %}

{% block title %}
Login | StockVision AI
{% endblock %}

{% block content %}

<div class="auth-container">

    <div class="auth-card">

        <h1>Welcome Back</h1>

        <p>

            Login to StockVision AI

        </p>

        {% if error %}

        <div class="error-box">

            {{ error }}

        </div>

        {% endif %}

        <form method="POST">

            <input
                type="email"
                name="email"
                placeholder="Email"
                required>

            <input
                type="password"
                name="password"
                placeholder="Password"
                required>

            <button
                class="auth-btn">

                Login

            </button>

        </form>

        <p class="auth-footer">

            Don't have an account?

            <a href="/register">

                Register

            </a>

        </p>

    </div>

</div>

{% endblock %}
