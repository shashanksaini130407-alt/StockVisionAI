{% extends "base.html" %}

{% block title %}
Register | StockVision AI
{% endblock %}

{% block content %}

<div class="auth-container">

    <div class="auth-card">

        <h1>Create Account</h1>

        <p>

            Join StockVision AI

        </p>

        {% if error %}

        <div class="error-box">

            {{ error }}

        </div>

        {% endif %}

        <form method="POST">

            <input
                type="text"
                name="name"
                placeholder="Full Name"
                required>

            <input
                type="email"
                name="email"
                placeholder="Email Address"
                required>

            <input
                type="password"
                name="password"
                placeholder="Password"
                required>

            <button
                class="auth-btn">

                Register

            </button>

        </form>

        <p class="auth-footer">

            Already have an account?

            <a href="/login">

                Login

            </a>

        </p>

    </div>

</div>

{% endblock %}
